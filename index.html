<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>IFC Kontroll | Leveranse E102</title>
    <style>
        :root { 
            --norconsult-blue: #0047bb; 
            --error: #d9480f; 
            --success: #2b8a3e; 
            --neutral: #666;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f2f2f2; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 40px; border-bottom: 4px solid var(--norconsult-blue); box-sizing: border-box; }
        .logo-skanska { height: 120px; } .logo-norconsult { height: 40px; }
        
        .main-container { width: 95%; max-width: 900px; margin-top: 30px; margin-bottom: 50px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        #drop-zone { border: 3px dashed #ccc; padding: 50px; border-radius: 10px; cursor: pointer; transition: 0.3s; background: #fafafa; text-align: center; }
        #drop-zone.hover { border-color: var(--norconsult-blue); background: #eef4ff; }
        #drop-zone p { font-size: 1.2em; color: #555; pointer-events: none; }

        .result-card { margin-top: 30px; text-align: left; display: none; padding: 25px; border-radius: 5px; border: 1px solid #ddd; background: #fff; }
        .status-header { font-size: 1.6em; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; text-align: center; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; background: #fdfdfd; }
        .check-item span:first-child { font-weight: 500; color: #444; }
        
        .fail { color: var(--error); font-weight: bold; }
        .pass { color: var(--success); font-weight: bold; }
        
        .summary-box { margin-top: 20px; padding: 15px; border-radius: 4px; text-align: center; font-weight: bold; }
        .summary-fail { background: #fff5f5; color: #c92a2a; border: 1px solid #ffa8a8; }
        .summary-pass { background: #f4fce3; color: #2b8a3e; border: 1px solid #b2f2bb; }
        
        .info-text { font-size: 0.85em; color: #888; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<header class="header-bar">
    <h1 style="color: var(--norconsult-blue); font-size: 1.2em;">EGENKONTROLL IFC-METADATA</h1>
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="https://download.logo.wine/logo/Skanska/Skanska-Logo.wine.png" class="logo-skanska">
        <img src="https://companieslogo.com/img/orig/NORCO.OL_BIG-2216a709.png?t=1721396473" class="logo-norconsult">
    </div>
</header>

<div class="main-container">
    <h2 style="text-align: center; color: #333;">Leveransekontroll: E102 Fornebukrysset - Strand</h2>
    <p style="text-align: center;">Slipp IFC-filen her for å kontrollere at alle påkrevde egenskaper er utfylt i henhold til kravspesifikasjon.</p>
    
    <div id="drop-zone">
        <p id="drop-text">Dra IFC-fil hit eller klikk for å velge</p>
        <input type="file" id="file-input" accept=".ifc" style="display: none;">
    </div>

    <div id="result" class="result-card">
        <div id="status-title" class="status-header"></div>
        <div class="grid-container" id="check-grid"></div>
        <div id="summary-msg"></div>
        <div class="info-text">Analyserer de første 50MB av filen for å finne Psets.</div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const resultCard = document.getElementById('result');
    const dropText = document.getElementById('drop-text');

    const KRAV_LISTE = [
        "Entreprise", "Fagkode", "Firmanavn", "Godkjent av", 
        "Kontrollert av", "MMI", "NVDB", "Objektkode V770", "PNS", 
        "Prosjektnavn", "Revisjon", "Revisjonsdato"
    ];

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
        dropText.innerText = "Analyserer " + file.name + "...";
        resultCard.style.display = 'none';

        // Vi leser de første 50MB
        const blob = file.slice(0, 50 * 1024 * 1024); 
        const reader = new FileReader();

        reader.onload = function(e) {
            const content = e.target.result;
            validerMetadata(content, file.name);
        };
        reader.readAsText(blob);
    }

    function validerMetadata(text, filename) {
        const resultater = {};
        
        KRAV_LISTE.forEach(felt => {
            // Regex som ser etter IFC-formatet: 'FELTNAVN',$,IFC_TYPE('VERDI')
            // Håndterer IFCLABEL, IFCTEXT, IFCIDENTIFIER osv.
            const regex = new RegExp(`'${felt}',\\$,(?:IFCLABEL|IFCIDENTIFIER|IFCTEXT|IFCPARAMETERVALUE)\\('([^']*)'\\)`, 'i');
            const match = text.match(regex);
            resultater[felt] = match ? match[1] : null;
        });

        visResultat(resultater, filename);
    }

    function visResultat(data, filename) {
        const grid = document.getElementById('check-grid');
        const title = document.getElementById('status-title');
        const summary = document.getElementById('summary-msg');
        
        grid.innerHTML = "";
        let feilAntall = 0;
        const dateRegex = /^\d{4}-\d{2}-\d{2}$/; // YYYY-MM-DD

        KRAV_LISTE.forEach(felt => {
            let verdi = data[felt];
            let erOk = verdi !== null && verdi.trim() !== "" && verdi !== "-";
            let visningsTekst = erOk ? `OK (${verdi})` : "MANGLER";
            
            // Spesialvalidering for Revisjonsdato
            if (felt === "Revisjonsdato" && erOk) {
                if (!dateRegex.test(verdi)) {
                    erOk = false;
                    visningsTekst = `FEIL FORMAT (${verdi})`;
                }
            }

            if (!erOk) feilAntall++;

            grid.innerHTML += `
                <div class="check-item">
                    <span>${felt}</span>
                    <span class="${erOk ? 'pass' : 'fail'}">${visningsTekst}</span>
                </div>
            `;
        });

        if (feilAntall === 0) {
            title.innerHTML = "✅ KONTROLL UTFØRT";
            summary.className = "summary-box summary-pass";
            summary.innerHTML = `Modellen "${filename}" oppfyller alle metadata-krav og er klar for leveranse.`;
        } else {
            title.innerHTML = "❌ MANGLER DATA";
            summary.className = "summary-box summary-fail";
            summary.innerHTML = `Modellen har ${feilAntall} feil/mangler som må utbedres før leveranse.`;
        }

        resultCard.style.display = 'block';
        dropText.innerText = "Sjekk fullført for " + filename;
    }
</script>

</body>
</html>
