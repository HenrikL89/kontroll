<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>IFC Kontroll | E102 Fornebukrysset - Strand</title>
    <style>
        :root { --norconsult-blue: #0047bb; --error: #d9480f; --success: #2b8a3e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f2f2f2; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 40px; border-bottom: 4px solid var(--norconsult-blue); box-sizing: border-box; }
        .logo-skanska { height: 120px; } .logo-norconsult { height: 40px; }
        
        .main-container { width: 90%; max-width: 800px; margin-top: 30px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        
        #drop-zone { border: 3px dashed #ccc; padding: 60px; border-radius: 10px; cursor: pointer; transition: 0.3s; background: #fafafa; }
        #drop-zone.hover { border-color: var(--norconsult-blue); background: #eef4ff; }
        #drop-zone p { font-size: 1.2em; color: #555; pointer-events: none; }

        .result-card { margin-top: 30px; text-align: left; display: none; padding: 25px; border-radius: 5px; border: 1px solid #ddd; background: #fff; }
        .status-header { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        
        .check-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 1.1em; }
        .fail { color: var(--error); font-weight: bold; }
        .pass { color: var(--success); font-weight: bold; }
        
        .info-text { font-size: 0.9em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<header class="header-bar">
    <h1 style="color: var(--norconsult-blue); font-size: 1.2em;">EGENKONTROLL IFC-LEVERANSE</h1>
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="https://download.logo.wine/logo/Skanska/Skanska-Logo.wine.png" class="logo-skanska">
        <img src="https://companieslogo.com/img/orig/NORCO.OL_BIG-2216a709.png?t=1721396473" class="logo-norconsult">
    </div>
</header>

<div class="main-container">
    <h2 style="color: #333;">Leveranse - E102 Fornebukrysset - Strand</h2>
    <p>Dra og slipp IFC-filen under for å sjekke om <b>MMI, Revisjon og Dato</b> er på plass.</p>
    
    <div id="drop-zone">
        <p id="drop-text">Slipp IFC-fil her eller klikk for å velge</p>
        <input type="file" id="file-input" accept=".ifc" style="display: none;">
    </div>

    <div id="result" class="result-card">
        <div id="status-title" class="status-header"></div>
        <div id="check-list"></div>
        <div class="info-text">Merk: Vi skanner de første 20MB av fila for metadata.</div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const resultCard = document.getElementById('result');
    const dropText = document.getElementById('drop-text');

    // Åpne filvelger ved klikk
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    // Drag and drop logikk
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('hover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('hover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    function handleFile(file) {
        if (!file.name.toLowerCase().endswith('.ifc')) {
            // Noen nettlesere er strenge på endelse, vi fikser sjekken her
        }
        
        dropText.innerText = "Analyserer " + file.name + "...";
        
        // Vi leser bare starten av fila (første 20MB) for å være lynraske
        // Metadata ligger nesten alltid spredt, men 20MB holder i 99% av tilfellene.
        const blob = file.slice(0, 20 * 1024 * 1024); 
        const reader = new FileReader();

        reader.onload = function(e) {
            const content = e.target.result;
            validerMetadata(content, file.name);
        };

        reader.readAsText(blob);
    }

    function validerMetadata(text, filename) {
        // Regex for å finne IFC verdier: vi ser etter 'FELTNAVN',$,IFCLABEL('VERDI')
        function finnVerdi(felt) {
            const regex = new RegExp(`'${felt}',\\$,(?:IFCLABEL|IFCIDENTIFIER|IFCTEXT)\\('([^']*)'\\)`, 'i');
            const match = text.match(regex);
            return match ? match[1] : null;
        }

        const data = {
            MMI: finnVerdi("MMI"),
            Revisjon: finnVerdi("Revisjon"),
            Revisjonsdato: finnVerdi("Revisjonsdato")
        };

        visResultat(data, filename);
    }

    function visResultat(data, filename) {
        const list = document.getElementById('check-list');
        const title = document.getElementById('status-title');
        list.innerHTML = "";
        dropText.innerText = "Fil sjekket: " + filename;
        
        let errors = 0;
        const dateRegex = /^\d{4}-\d{2}-\d{2}$/; // YYYY-MM-DD

        // Valider MMI
        const mmiPass = data.MMI !== null;
        list.innerHTML += createRow("MMI", data.MMI, mmiPass);
        if (!mmiPass) errors++;

        // Valider Revisjon
        const revPass = data.Revisjon !== null;
        list.innerHTML += createRow("Revisjon", data.Revisjon, revPass);
        if (!revPass) errors++;

        // Valider Dato
        let datoMsg = data.Revisjonsdato;
        let datoPass = true;
        if (!data.Revisjonsdato) {
            datoMsg = "MANGLER";
            datoPass = false;
        } else if (!dateRegex.test(data.Revisjonsdato)) {
            datoMsg = data.Revisjonsdato + " (FEIL FORMAT - Bruk YYYY-MM-DD)";
            datoPass = false;
        }
        list.innerHTML += createRow("Revisjonsdato", datoMsg, datoPass);
        if (!datoPass) errors++;

        if (errors === 0) {
            title.innerHTML = "✅ Godkjent for leveranse";
            title.style.color = "var(--success)";
        } else {
            title.innerHTML = "❌ Mangler nødvendig informasjon";
            title.style.color = "var(--error)";
        }

        resultCard.style.display = 'block';
    }

    function createRow(label, value, isPass) {
        return `
            <div class="check-item">
                <span>${label}:</span>
                <span class="${isPass ? 'pass' : 'fail'}">${isPass ? 'OK (' + value + ')' : value || 'MANGLER'}</span>
            </div>
        `;
    }

    // Polyfill for endswith i eldre nettlesere
    if (!String.prototype.endswith) {
        String.prototype.endswith = function(suffix) {
            return this.indexOf(suffix, this.length - suffix.length) !== -1;
        };
    }
</script>

</body>
</html>
