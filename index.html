<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Leveranser - E102 Fornebukrysset - Strand</title>
    <style>
        :root { --nc-blue: #0047bb; --err: #d9480f; --ok: #2b8a3e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f2f2f2; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 40px; border-bottom: 4px solid var(--nc-blue); box-sizing: border-box; min-height: 160px; }
        .logo-skanska { height: 150px; } .logo-norconsult { height: 50px; }
        .logo-wrapper { display: flex; align-items: center; gap: 30px; }
        
        .main-container { width: 95%; max-width: 900px; margin: 30px 0; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        #drop-zone { border: 3px dashed #ccc; padding: 60px; border-radius: 10px; cursor: pointer; text-align: center; background: #fafafa; transition: 0.2s; position: relative; }
        #drop-zone.hover { border-color: var(--nc-blue); background: #eef4ff; }
        
        /* Laste-animasjon */
        .loader-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); border-radius: 10px; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--nc-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result-card { display: none; margin-top: 30px; width: 100%; }
        .status-header { font-size: 1.6em; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 14px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        
        .fail { color: var(--err); font-weight: bold; }
        .pass { color: var(--ok); font-weight: bold; }
        .ifc-icon { height: 20px; vertical-align: middle; margin-right: 10px; }
        
        .summary-box { padding: 20px; border-radius: 6px; margin-bottom: 25px; font-weight: 500; text-align: center; }
        .summary-fail { background: #fff5f5; border: 1px solid #ffa8a8; color: #c92a2a; }
        .summary-pass { background: #f4fce3; border: 1px solid #b2f2bb; color: #2b8a3e; }
        
        small { display: block; color: #666; margin-top: 4px; line-height: 1.4; }
    </style>
</head>
<body>

<header class="header-bar">
    <h1 style="color: var(--nc-blue); font-size: 1.2em; text-transform: uppercase;">Leveranser - E102 Fornebukrysset - Strand</h1>
    <div class="logo-wrapper">
        <img src="https://download.logo.wine/logo/Skanska/Skanska-Logo.wine.png" alt="Skanska" class="logo-skanska">
        <img src="https://companieslogo.com/img/orig/NORCO.OL_BIG-2216a709.png?t=1721396473" alt="Norconsult" class="logo-norconsult">
    </div>
</header>

<div class="main-container">
    <div id="drop-zone">
        <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <b id="loader-text">Analyserer filstruktur...</b>
        </div>
        <p id="drop-instruction" style="font-size: 1.3em; color: #444;">Dra og slipp IFC-fil her for kontroll</p>
        <p style="color: #888;">Støtter flere revisjoner og objektkoder i samme fil.</p>
        <input type="file" id="file-input" accept=".ifc" style="display: none;">
    </div>

    <div id="result" class="result-card">
        <div id="status-title" class="status-header"></div>
        <div id="summary-msg"></div>
        
        <table>
            <thead>
                <tr>
                    <th>Egenskap</th>
                    <th>Status / Verdi funnet</th>
                    <th>Informasjon</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>
</div>

<script>
    const KRAV = [
        "Entreprise", "Fagkode", "Firmanavn", "Godkjent av", 
        "Kontrollert av", "MMI", "Objektkode V770", "PNS", 
        "Prosjektnavn", "Revisjon", "Revisjonsdato"
    ];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const resultCard = document.getElementById('result');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');
    const body = document.getElementById('result-body');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        handleFile(e.dataTransfer.files[0]);
    };

    function handleFile(file) {
        if (!file) return;

        // Reset UI og vis laster
        resultCard.style.display = 'none';
        loader.style.display = 'flex';
        loaderText.innerText = "Leser " + file.name + "...";

        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            // Bruk setTimeout for å la browseren vise laster-animasjonen før tung Regex starter
            setTimeout(() => {
                analyserTekst(content, file.name);
                loader.style.display = 'none';
                fileInput.value = ""; // Nullstill input slik at samme fil kan velges på nytt
            }, 100);
        };
        reader.readAsText(file);
    }

    function analyserTekst(text, filename) {
        let funn = {};
        KRAV.forEach(k => funn[k] = new Set());

        const regex = /IFCPROPERTYSINGLEVALUE\s*\(\s*'([^']+)'\s*,\s*\$\s*,\s*[A-Z]+\s*\(\s*'([^']*)'\s*\)/g;
        
        let match;
        while ((match = regex.exec(text)) !== null) {
            const propName = match[1];
            const propValue = match[2];
            
            if (KRAV.includes(propName)) {
                if (propValue.trim() !== "") {
                    funn[propName].add(propValue.trim());
                }
            }
        }
        visResultat(funn, filename);
    }

    function visResultat(funn, filename) {
        const title = document.getElementById('status-title');
        const summary = document.getElementById('summary-msg');
        body.innerHTML = "";
        
        let feilAntall = 0;
        const dateRegex = /^\d{4}-\d{2}-\d{2}$/; // YYYY-MM-DD
        const objektkodeRegex = /^\d{8}$/; // 8 siffer

        KRAV.forEach(k => {
            const verdier = Array.from(funn[k]);
            let statusHTML = "";
            let infoHTML = "";
            let isError = false;

            // Definerer hvilke felt som tillater flere ulike verdier (Multi-fields)
            const allowMultiple = ["Objektkode V770", "Kontrollert av", "Revisjon", "Revisjonsdato"];

            if (verdier.length === 0) {
                statusHTML = `<span class="fail">MANGLER</span>`;
                infoHTML = `Egenskapen ble ikke funnet i fila.`;
                isError = true;
            } 
            else if (verdier.length > 1 && !allowMultiple.includes(k)) {
                // Disse feltene må være like på alle objekter (f.eks. Prosjektnavn)
                statusHTML = `<span class="fail">INKONSISTENT</span>`;
                infoHTML = `Funnet flere ulike verdier: ${verdier.join(", ")}. Må være identisk på alle objekter.`;
                isError = true;
            } 
            else {
                // Sjekker spesifikke formater
                if (k === "Godkjent av") {
                    if (verdier[0] !== "ThSel") {
                        statusHTML = `<span class="fail">FEIL VERDI: ${verdier[0]}</span>`;
                        infoHTML = `Påkrevd godkjenner: ThSel`;
                        isError = true;
                    } else {
                        statusHTML = `<span class="pass">OK: ThSel</span>`;
                    }
                } 
                else if (k === "Revisjonsdato") {
                    const ugyldigeDatoer = verdier.filter(d => !dateRegex.test(d));
                    if (ugyldigeDatoer.length > 0) {
                        statusHTML = `<span class="fail">FEIL FORMAT</span>`;
                        infoHTML = `Alle datoer må følge YYYY-MM-DD. Funnet feil: ${ugyldigeDatoer.join(", ")}`;
                        isError = true;
                    } else {
                        statusHTML = `<span class="pass">OK (${verdier.length} datoer)</span>`;
                        infoHTML = `Alle datoer har korrekt format: ${verdier.join(", ")}`;
                    }
                }
                else if (k === "Objektkode V770") {
                    const ugyldigeKoder = verdier.filter(c => !objektkodeRegex.test(c));
                    if (ugyldigeKoder.length > 0) {
                        statusHTML = `<span class="fail">FEIL FORMAT</span>`;
                        infoHTML = `Alle koder må være 8 siffer. Funnet feil: ${ugyldigeKoder.join(", ")}`;
                        isError = true;
                    } else {
                        statusHTML = `<span class="pass">OK (${verdier.length} koder)</span>`;
                        infoHTML = `Alle koder er gyldige: ${verdier.join(", ")}`;
                    }
                }
                else if (allowMultiple.includes(k)) {
                    // Generell visning for Revisjon og Kontrollert av som tillater flere verdier
                    statusHTML = `<span class="pass">OK (${verdier.length} verdier)</span>`;
                    infoHTML = `Verdier funnet: ${verdier.join(", ")}`;
                }
                else {
                    // Standardfelt (Ett sff, identisk)
                    statusHTML = `<span class="pass">OK: ${verdier[0]}</span>`;
                }
            }

            if (isError) feilAntall++;
            
            body.innerHTML += `
                <tr>
                    <td>
                        <img src="https://p7.hiclipart.com/preview/1009/635/820/industry-foundation-classes-building-information-modeling-buildingsmart-navisworks-bim.jpg" class="ifc-icon">
                        <b>${k}</b>
                    </td>
                    <td>${statusHTML}</td>
                    <td><small>${infoHTML}</small></td>
                </tr>`;
        });

        summary.className = feilAntall === 0 ? "summary-box summary-pass" : "summary-box summary-fail";
        summary.innerHTML = feilAntall === 0 
            ? `✅ Modellen "${filename}" er godkjent.` 
            : `❌ Modellen "${filename}" har ${feilAntall} avvik.`;

        title.innerHTML = feilAntall === 0 ? "Godkjent for leveranse" : "Avvik funnet i metadata";
        resultCard.style.display = 'block';
        window.scrollTo({ top: resultCard.offsetTop - 50, behavior: 'smooth' });
    }
</script>

</body>
</html>
