<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Metadata Kontroll | E102 Fornebukrysset</title>
    <style>
        :root { --nc-blue: #0047bb; --err: #d9480f; --ok: #2b8a3e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f2f2f2; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 40px; border-bottom: 4px solid var(--nc-blue); box-sizing: border-box; }
        .logo-skanska { height: 120px; } .logo-norconsult { height: 45px; }
        .main-container { width: 95%; max-width: 1000px; margin: 30px 0; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        #drop-zone { border: 3px dashed #ccc; padding: 60px; border-radius: 10px; cursor: pointer; text-align: center; background: #fafafa; transition: 0.2s; }
        #drop-zone.hover { border-color: var(--nc-blue); background: #eef4ff; }
        .loader { display: none; margin: 20px 0; font-weight: bold; color: var(--nc-blue); text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--nc-blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-card { display: none; margin-top: 30px; }
        .status-header { font-size: 1.6em; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { text-align: left; padding: 14px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .fail { color: var(--err); font-weight: bold; }
        .pass { color: var(--ok); font-weight: bold; }
        .summary-box { padding: 20px; border-radius: 6px; margin-bottom: 25px; font-weight: 500; }
        .summary-fail { background: #fff5f5; border: 1px solid #ffa8a8; color: #c92a2a; }
        .summary-pass { background: #f4fce3; border: 1px solid #b2f2bb; color: #2b8a3e; }
        .val-list { font-size: 0.85em; color: #555; }
    </style>
</head>
<body>

<header class="header-bar">
    <h1 style="color: var(--nc-blue); font-size: 1.1em; letter-spacing: 1px;">KONTROLL AV LEVERANSE-METADATA</h1>
    <div style="display: flex; align-items: center; gap: 30px;">
        <img src="https://download.logo.wine/logo/Skanska/Skanska-Logo.wine.png" class="logo-skanska">
        <img src="https://companieslogo.com/img/orig/NORCO.OL_BIG-2216a709.png?t=1721396473" class="logo-norconsult">
    </div>
</header>

<div class="main-container">
    <h2 style="text-align: center;">E102 Fornebukrysset - Strand</h2>
    <div id="drop-zone">
        <p style="font-size: 1.2em; color: #444;">Dra og slipp IFC-fil her</p>
        <p style="font-size: 0.9em; color: #888;">Analyserer alle objekter og egenskaper...</p>
        <input type="file" id="file-input" accept=".ifc" style="display: none;">
    </div>
    <div id="loader" class="loader"><div class="spinner"></div>Søker gjennom hele IFC-strukturen...</div>
    <div id="result" class="result-card">
        <div id="status-title" class="status-header"></div>
        <div id="summary-msg"></div>
        <table>
            <thead><tr><th>Påkrevd Egenskap</th><th>Status / Verdi</th><th>Samsvar (Alle objekter)</th></tr></thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { IfcAPI } from 'https://unpkg.com/web-ifc@0.0.44/web-ifc-api.js?module';
    const ifcApi = new IfcAPI();
    ifcApi.SetWasmPath('https://unpkg.com/web-ifc@0.0.44/', true);
    await ifcApi.Init();

    const KRAV = ["Entreprise", "FDV", "Fagkode", "Firmanavn", "Godkjent av", "Kontrollert av", "MMI", "NVDB", "Objektkode V770", "PNS", "Prosjektnavn", "Revisjon", "Revisjonsdato"];
    
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('result');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('hover'); handleFile(e.dataTransfer.files[0]); };

    async function handleFile(file) {
        if (!file) return;
        loader.style.display = 'block';
        resultCard.style.display = 'none';
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const modelID = ifcApi.OpenModel(data);
            await analyserModell(modelID, file.name);
            ifcApi.CloseModel(modelID);
            loader.style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    }

    // Ekstremt robust verdi-uthenter
    function extractValue(nominalValue) {
        if (nominalValue === null || nominalValue === undefined) return null;
        if (typeof nominalValue === 'object') {
            // Sjekker alle kjente felter web-ifc bruker for verdier
            const val = nominalValue.value !== undefined ? nominalValue.value : 
                        nominalValue.label !== undefined ? nominalValue.label : null;
            return val;
        }
        return nominalValue;
    }

    async function analyserModell(modelID, filename) {
        const products = ifcApi.GetLineIDsWithType(modelID, 3031050529); // IfcProduct
        const totalObjects = products.size();
        
        // Map for å lagre egenskaper per objekt: Map<ObjectID, {PropName: Value}>
        const objectPropertyMap = new Map();

        // Vi går gjennom alle Property-relasjoner manuelt (dette er mest treffsikkert)
        const relations = ifcApi.GetLineIDsWithType(modelID, 3965522501); // IfcRelDefinesByProperties
        for (let i = 0; i < relations.size(); i++) {
            const rel = ifcApi.GetLine(modelID, relations.get(i), true);
            if (!rel || !rel.RelatingPropertyDefinition || !rel.RelatedObjects) continue;

            const pset = ifcApi.GetLine(modelID, rel.RelatingPropertyDefinition.value, true);
            if (!pset || !pset.HasProperties) continue;

            for (const propRel of pset.HasProperties) {
                const prop = ifcApi.GetLine(modelID, propRel.value, true);
                if (!prop || !prop.Name) continue;

                const pName = prop.Name.value;
                if (KRAV.includes(pName)) {
                    const finalValue = extractValue(prop.NominalValue);
                    
                    if (finalValue !== null && String(finalValue).trim() !== "") {
                        // Koble denne verdien til alle objektene i relasjonen
                        for (const objRef of rel.RelatedObjects) {
                            const objID = objRef.value;
                            if (!objectPropertyMap.has(objID)) objectPropertyMap.set(objID, {});
                            objectPropertyMap.get(objID)[pName] = String(finalValue).trim();
                        }
                    }
                }
            }
        }

        // Beregn statistikk basert på alle IfcProducts
        let stats = {};
        KRAV.forEach(k => stats[k] = { found: 0, values: new Set(), missing: 0 });

        for (let i = 0; i < totalObjects; i++) {
            const objID = products.get(i);
            const props = objectPropertyMap.get(objID) || {};

            KRAV.forEach(k => {
                if (props[k]) {
                    stats[k].found++;
                    stats[k].values.add(props[k]);
                } else {
                    stats[k].missing++;
                }
            });
        }

        visResultat(stats, totalObjects, filename);
    }

    function visResultat(stats, total, filename) {
        const body = document.getElementById('result-body');
        const title = document.getElementById('status-title');
        const summary = document.getElementById('summary-msg');
        body.innerHTML = "";
        let errors = 0;
        const dateRegex = /^\d{4}-\d{2}-\d{2}$/;

        KRAV.forEach(k => {
            const s = stats[k];
            const uniqueValues = Array.from(s.values);
            let statusHTML = "";
            let samsvarHTML = "";
            let isError = false;

            if (s.found === 0) {
                statusHTML = `<span class="fail">IKKE FUNNET I MODELLEN</span>`;
                samsvarHTML = "Mangler på alle objekter";
                isError = true;
            } else if (s.missing > 0) {
                statusHTML = `<span class="fail">DELVIS MANGLER</span>`;
                samsvarHTML = `Mangler på ${s.missing} av ${total} objekter. Funnet: ${uniqueValues.join(", ")}`;
                isError = true;
            } else if (uniqueValues.length > 1) {
                statusHTML = `<span class="fail">INKONSISTENT</span>`;
                samsvarHTML = `Ulike verdier funnet: ${uniqueValues.join(" | ")}`;
                isError = true;
            } else {
                const val = uniqueValues[0];
                if (k === "Revisjonsdato") {
                    if (!dateRegex.test(val)) {
                        statusHTML = `<span class="fail">FEIL FORMAT: "${val}"</span>`;
                        samsvarHTML = `Krav: YYYY-MM-DD`;
                        isError = true;
                    } else {
                        statusHTML = `<span class="pass">OK: ${val}</span>`;
                        samsvarHTML = `100% samsvar`;
                    }
                } else {
                    statusHTML = `<span class="pass">OK: ${val}</span>`;
                    samsvarHTML = `100% samsvar`;
                }
            }

            if (isError) errors++;
            body.innerHTML += `<tr><td><b>${k}</b></td><td>${statusHTML}</td><td>${samsvarHTML}</td></tr>`;
        });

        summary.className = errors === 0 ? "summary-box summary-pass" : "summary-box summary-fail";
        summary.innerHTML = errors === 0 ? `Modellen "${filename}" er godkjent.` : `Fant ${errors} avvik i "${filename}".`;
        title.innerHTML = errors === 0 ? "✅ Godkjent" : "❌ Avvik funnet";
        resultCard.style.display = 'block';
    }
</script>
</body>
</html>
