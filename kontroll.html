<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>IFC Kontroll | E102 Fornebukrysset - Strand</title>
    <style>
        :root { --norconsult-blue: #0047bb; --skanska-blue: #0047bb; --error: #d9480f; --success: #2b8a3e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f2f2f2; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 40px; border-bottom: 4px solid var(--norconsult-blue); box-sizing: border-box; }
        .logo-skanska { height: 80px; } .logo-norconsult { height: 40px; }
        
        .main-container { width: 800px; margin-top: 50px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        
        #drop-zone { border: 3px dashed #ccc; padding: 60px; border-radius: 10px; cursor: pointer; transition: 0.3s; background: #fafafa; position: relative; }
        #drop-zone.hover { border-color: var(--norconsult-blue); background: #eef4ff; }
        #drop-zone p { font-size: 1.2em; color: #555; }

        .result-card { margin-top: 30px; text-align: left; display: none; padding: 20px; border-radius: 5px; border: 1px solid #ddd; }
        .status-header { font-size: 1.5em; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; }
        
        .check-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .fail { color: var(--error); font-weight: bold; }
        .pass { color: var(--success); font-weight: bold; }
        
        .loading { display: none; margin: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--norconsult-blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header class="header-bar">
    <h1 style="color: var(--norconsult-blue); font-size: 1.2em;">EGENKONTROLL IFC-LEVERANSE</h1>
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="https://download.logo.wine/logo/Skanska/Skanska-Logo.wine.png" class="logo-skanska">
        <img src="https://companieslogo.com/img/orig/NORCO.OL_BIG-2216a709.png?t=1721396473" class="logo-norconsult">
    </div>
</header>

<div class="main-container">
    <h2>Dra og slipp IFC-fil for kontroll</h2>
    <p>Vi sjekker om metadataene <b>MMI, Revisjon og Revisjonsdato</b> er korrekt utfylt.</p>
    
    <div id="drop-zone">
        <p>Slipp IFC-filen her eller klikk for å velge</p>
        <input type="file" id="file-input" accept=".ifc" style="display: none;">
    </div>

    <div class="loading" id="loader">
        <div class="spinner"></div>
        <p>Analyserer metadata...</p>
    </div>

    <div id="result" class="result-card">
        <div id="status-title" class="status-header"></div>
        <div id="check-list"></div>
    </div>
</div>

<!-- Web-IFC Bibliotek -->
<script type="module">
    import { IfcAPI } from 'https://unpkg.com/web-ifc@0.0.44/web-ifc-api.js?module';

    const ifcApi = new IfcAPI();
    await ifcApi.Init();

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const resultCard = document.getElementById('result');
    const loader = document.getElementById('loader');

    // Klikk for å velge fil
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    // Drag & Drop events
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        handleFile(e.dataTransfer.files[0]);
    };

    async function handleFile(file) {
        if (!file || !file.name.endsWith('.ifc')) {
            alert("Vennligst velg en .ifc fil");
            return;
        }

        resultCard.style.display = 'none';
        loader.style.display = 'block';

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const modelID = ifcApi.OpenModel(data);
            
            validerIFC(modelID, file.name);
            
            ifcApi.CloseModel(modelID);
            loader.style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    }

    function validerIFC(modelID, filename) {
        // Finn alle Property Sets
        const psets = ifcApi.GetLineIDsWithType(modelID, 1373574163); // IfcPropertySet
        let foundData = { MMI: null, Revisjon: null, Revisjonsdato: null };

        // Skann gjennom alle props for å finne våre verdier
        for (let i = 0; i < psets.size(); i++) {
            const pset = ifcApi.GetLine(modelID, psets.get(i), true);
            if (pset.HasProperties) {
                pset.HasProperties.forEach(propRel => {
                    const prop = ifcApi.GetLine(modelID, propRel.value, true);
                    const name = prop.Name?.value;
                    const value = prop.NominalValue?.value;

                    if (name === "MMI") foundData.MMI = value;
                    if (name === "Revisjon") foundData.Revisjon = value;
                    if (name === "Revisjonsdato") foundData.Revisjonsdato = value;
                });
            }
        }

        visResultat(foundData, filename);
    }

    function visResultat(data, filename) {
        const list = document.getElementById('check-list');
        const title = document.getElementById('status-title');
        list.innerHTML = "";
        
        let errors = [];
        const dateRegex = /^\d{4}-\d{2}-\d{2}$/; // YYYY-MM-DD

        // Sjekk MMI
        const mmiStatus = data.MMI ? `<span class="pass">OK (${data.MMI})</span>` : `<span class="fail">MANGLER</span>`;
        if (!data.MMI) errors.push("MMI");
        list.innerHTML += `<div class="check-item"><span>MMI:</span> ${mmiStatus}</div>`;

        // Sjekk Revisjon
        const revStatus = data.Revisjon ? `<span class="pass">OK (${data.Revisjon})</span>` : `<span class="fail">MANGLER</span>`;
        if (!data.Revisjon) errors.push("Revisjon");
        list.innerHTML += `<div class="check-item"><span>Revisjon:</span> ${revStatus}</div>`;

        // Sjekk Dato
        let dateStatus;
        if (!data.Revisjonsdato) {
            dateStatus = `<span class="fail">MANGLER</span>`;
            errors.push("Revisjonsdato");
        } else if (!dateRegex.test(data.Revisjonsdato)) {
            dateStatus = `<span class="fail">FEIL FORMAT (${data.Revisjonsdato}). Bruk YYYY-MM-DD</span>`;
            errors.push("Datoformat");
        } else {
            dateStatus = `<span class="pass">OK (${data.Revisjonsdato})</span>`;
        }
        list.innerHTML += `<div class="check-item"><span>Revisjonsdato:</span> ${dateStatus}</div>`;

        if (errors.length === 0) {
            title.innerHTML = `✅ ${filename} er GODKJENT`;
            title.style.color = "var(--success)";
        } else {
            title.innerHTML = `❌ ${filename} har FEIL`;
            title.style.color = "var(--error)";
        }

        resultCard.style.display = 'block';
    }
</script>

</body>
</html>
